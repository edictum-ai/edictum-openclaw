name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            chore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

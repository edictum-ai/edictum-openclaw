name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Upgrade npm for trusted publishing (OIDC) — bundled npm <11.5.1 fails with E404 for scoped packages
      # See: https://github.com/npm/cli/issues/8678, https://github.com/hirokisakabe/pom/pull/519
      - name: Upgrade npm for trusted publishing (OIDC)
        run: npm install -g npm@^11.5.1

      - run: pnpm build
      - run: pnpm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true

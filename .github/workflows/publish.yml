name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      # No registry-url — avoids injected NODE_AUTH_TOKEN that breaks OIDC
      # See: https://github.com/JamesHenry/lerna-v9-oidc-publishing-example
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Configure registry manually and publish with OIDC
      - name: Publish to npm
        run: |
          npm config set registry https://registry.npmjs.org/
          npm publish --access public

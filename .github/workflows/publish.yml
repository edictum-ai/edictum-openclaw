name: Publish

on:
  release:
    types: [published]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          # Do NOT set registry-url here — it injects a default token
          # that overrides OIDC. We configure .npmrc manually below.

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Configure npm for OIDC provenance publishing
      # See: https://github.com/orgs/community/discussions/176761
      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          npm publish --access public --provenance --registry https://registry.npmjs.org

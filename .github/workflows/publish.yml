name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Upgrade npm — bundled version doesn't support OIDC for scoped packages
      # See: https://github.com/npm/cli/issues/8678
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Clear setup-node's default NODE_AUTH_TOKEN to allow OIDC
      # See: https://github.com/orgs/community/discussions/176761
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
